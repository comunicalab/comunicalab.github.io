<header id="masthead" class="site-header" role="banner">
  <div class="site-branding">
    <p class="site-title">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/img/comunicalab-icon.png' | relative_url }}" alt="" aria-hidden="true">
        {{ site.title }}
      </a>
    </p>
    <span class="conecta-description">{{ site.description }}</span>
  </div>

  <nav class="main-navigation" role="navigation" aria-label="Menu principal">
    <ul class="nav-menu">
      <li{% if page.url == "/" %} class="current-menu-item"{% endif %}>
        <a href="{{ '/' | relative_url }}">Início</a>
      </li>
      <li{% if page.url contains "/trabalhos" %} class="current-menu-item"{% endif %}>
        <a href="{{ '/trabalhos/' | relative_url }}">Trabalhos</a>
      </li>
      <li{% if page.url contains "/projetos" %} class="current-menu-item"{% endif %}>
        <a href="{{ '/projetos/' | relative_url }}">Projetos</a>
      </li>
      <li{% if page.url contains "/eventos" %} class="current-menu-item"{% endif %}>
        <a href="{{ '/eventos/' | relative_url }}">Eventos</a>
      </li>
      <li{% if page.url contains "/professores" %} class="current-menu-item"{% endif %}>
        <a href="{{ '/professores/' | relative_url }}">Professores</a>
      </li>
      <li{% if page.url contains "/sobre" %} class="current-menu-item"{% endif %}>
        <a href="{{ '/sobre/' | relative_url }}">Sobre</a>
      </li>
    </ul>
  </nav>
</header>
